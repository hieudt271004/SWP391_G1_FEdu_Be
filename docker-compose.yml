
services:
  backend:
    build:
      context: ./fedu
      dockerfile: Dockerfile
    container_name: fedu-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - JWT_ACCESS_KEY=${JWT_ACCESS_KEY}
      - JWT_REFRESH_KEY=${JWT_REFRESH_KEY}
      - JWT_RESET_KEY=${JWT_RESET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      # Đặt SPRING_PROFILES_ACTIVE=demo trong .env để nạp dữ liệu demo (Flyway db/demo)
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-}
    volumes:
      - ./uploads:/app/uploads


  frontend:
    build:
      context: ./SWP391_G1_FEdu_Fe
      dockerfile: Dockerfile
    container_name: fedu-frontend
    ports:
      - "80:8080"
    volumes:
      - ./SWP391_G1_FEdu_Fe:/app
      - /app/node_modules
    depends_on:
      - backend

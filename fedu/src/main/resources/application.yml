server:
  port: 8080

spring:
  application:
    name: fedu

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-square-rain-aonmzhf3-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&prepareThreshold=0}
    username: neondb_owner
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 270000
      keepalive-time: 120000
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Gom các lazy/eager-load cùng loại thành 1 query IN (...) — giảm N+1 toàn cục
        default_batch_fetch_size: 50
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: hieudtfptu@gmail.com
    password: ${MAIL_PASSWORD:}
    from: hieudtfptu@gmail.com
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

openapi:
  service:
    api-docs: fedu
    serverUrl: http://localhost:${server.port}
    serverName: FEdu System
    title: FEdu System
    version: 1.0.0

jwt:
  expiryMinute: 15
  expiryHour: 1
  expiryDay: 30
  accessKey: ${JWT_ACCESS_KEY}
  refreshKey: ${JWT_REFRESH_KEY}
  resetKey: ${JWT_RESET_KEY}

app:
  frontend-url: http://localhost:5173
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost,http://127.0.0.1,http://localhost:5173,http://localhost:3000,http://localhost:5174,http://localhost:5175}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:fedu}

